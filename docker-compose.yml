services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: eye_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: the_eye
    ports:
      - "5432:5432"
    volumes:
      - eye_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eye_admin -d the_eye"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  eye_pg_data:
