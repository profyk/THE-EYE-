services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: eye_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: the_eye
    ports:
      - "5432:5432"
    volumes:
      - eye_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eye_admin -d the_eye"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://eye_app:eye_app_devpassword@postgres:5432/the_eye
      ADMIN_DATABASE_URL: postgresql+asyncpg://eye_admin:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/the_eye
      ENV: development
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      # Optional: set to enable AI investigate feature
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  eye_pg_data:
